<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>
</head>
<body>

    <h2>HTML Forms</h2>

    <form action="/action_page.php">
        
        <label>First name:</label><br>
        <input type="text" name="firstname" value="John"><br><br>
        
        <label>Last name:</label><br>
        <input type="text" name="lastname" value="Doe"><br><br>

        <label>Classification:</label><br>
        <input type="radio" name="classification" value="Freshman"> Freshman<br>
        <input type="radio" name="classification" value="Sophomore"> Sophomore<br>
        <input type="radio" name="classification" value="Junior" checked> Junior<br>
        <input type="radio" name="classification" value="Senior"> Senior<br><br>

        <label>Languages you know</label><br>
        <input type="checkbox" name="language1" value="HTML" checked> HTML<br>
        <input type="checkbox" name="language2" value="CSS" checked> CSS<br>
        <input type="checkbox" name="language3" value="Java"> Java<br><br>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

    </form>

</body>
</html>
